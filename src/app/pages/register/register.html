<div class="loginPage">
  <mat-card class="loginCard">
    <div class="brand">
      <div class="logo">IoT</div>
      <div>
        <div class="title">Créer un compte</div>
        <div class="sub">Inscris-toi pour gérer ta flotte</div>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" autocomplete="email" />
        <mat-error *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
          Champ obligatoire
        </mat-error>
        <mat-error *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
          Email invalide
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Mot de passe</mat-label>
        <input
          matInput
          [type]="hide ? 'password' : 'text'"
          formControlName="password"
          autocomplete="new-password"
        />
        <button type="button" mat-icon-button matSuffix (click)="hide = !hide">
          <mat-icon>{{ hide ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Minimum 8 caractères
        </mat-error>
      </mat-form-field>

      <div class="error" *ngIf="error">{{ error }}</div>

      <button mat-raised-button class="btn" type="submit" [disabled]="loading">
        {{ loading ? 'Création…' : 'Créer mon compte' }}
      </button>
    </form>

    <div class="hint">
      Déjà un compte ? <a routerLink="/login"><b>Se connecter</b></a>
    </div>

    <div class="hint">Backend: <b>/api/v1/auth/register/</b></div>
  </mat-card>
</div>
