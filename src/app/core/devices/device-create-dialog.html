<h2 mat-dialog-title>Ajouter un appareil</h2>

<form [formGroup]="form">
  <div mat-dialog-content class="content">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Nom (optionnel)</mat-label>
      <mat-icon matPrefix>label</mat-icon>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Device EUI</mat-label>
      <mat-icon matPrefix>memory</mat-icon>
      <input
        matInput
        formControlName="device_eui"
        placeholder="Ex: 70B3D57ED0074DF2"
        maxlength="16"
      />
      <mat-hint>16 caractères hexadécimaux (0-9, A-F)</mat-hint>

      <mat-error *ngIf="form.get('device_eui')?.touched && form.get('device_eui')?.hasError('required')">
        Champ obligatoire
      </mat-error>
      <mat-error *ngIf="form.get('device_eui')?.touched && form.get('device_eui')?.hasError('pattern')">
        Format invalide (16 hex)
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Description (optionnel)</mat-label>
      <mat-icon matPrefix>notes</mat-icon>
      <textarea matInput rows="3" formControlName="description"></textarea>
    </mat-form-field>
  </div>

  <div mat-dialog-actions align="end">
    <button mat-button type="button" (click)="close()">Annuler</button>
    <button mat-raised-button color="primary" type="button" (click)="submit()">Ajouter</button>
  </div>
</form>
