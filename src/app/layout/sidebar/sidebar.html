<aside class="sb">
  <div class="sb__brand">
    <div class="sb__logo">
      <span class="dot"></span>
      <span class="text">Mauri<span>IoT</span></span>
    </div>
    <div class="sb__hint">Real-time monitoring</div>
  </div>

  <div class="sb__card">
    @if (user$ | async; as u) {
      <div class="sb__user">
        <div class="avatar" [ngStyle]="avatarStyle(u?.username)">
          {{ initials(u?.username) }}
        </div>

        <div class="meta">
          <div class="name">{{ u?.username ?? 'Utilisateur' }}</div>
          <div class="status">
            <span class="pill ok">
              <span class="led"></span>
              Connecté
            </span>
          </div>
        </div>
      </div>
    } @else {
      <div class="sb__user">
        <div class="avatar ghost">?</div>

        <div class="meta">
          <div class="name">Non connecté</div>
          <div class="status">
            <span class="pill off">
              <span class="led"></span>
              Hors ligne
            </span>
          </div>
        </div>
      </div>
    }
  </div>

  <nav class="sb__nav" aria-label="Navigation">
    @for (item of nav; track item.to) {
      <a
        class="sb__item"
        [routerLink]="item.to"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.to === '/dashboard' }"
        matRipple
        [matTooltip]="item.label"
        matTooltipPosition="right"
      >
        <mat-icon class="ic">{{ item.icon }}</mat-icon>
        <span class="label">{{ item.label }}</span>
        <span class="chev">›</span>
      </a>
    }
  </nav>

  <div class="sb__spacer"></div>

  <div class="sb__footer">
    <button class="sb__btn" type="button" matRipple (click)="logout()">
      <mat-icon>logout</mat-icon>
      Déconnexion
    </button>

    <div class="sb__mini">
      <span class="chip">v1.0</span>
      <span class="chip">LoRaWAN • MQTT</span>
    </div>
  </div>
</aside>
