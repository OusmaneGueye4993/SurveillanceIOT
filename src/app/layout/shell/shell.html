<mat-sidenav-container class="container">

  <mat-sidenav
    class="sidenav"
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile"
    (closedStart)="sidenavOpened = false"
  >
    <app-sidebar />
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <app-topbar
      [showMenuBtn]="isMobile"
      (menuToggle)="sidenav.toggle()"
    />
    <div class="page">
      <router-outlet />
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
